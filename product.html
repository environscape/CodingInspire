<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Info | Coding Inspire Modular</title>
    <link rel="icon" href="icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <a href="/CodingInspire">
            <img src="codinginspire.jpg" alt="品牌Logo" class="logo">
        </a>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Eurorack</a>
            <a href="instrument.html">Instrument</a>
            <a href="support.html">Support</a>
        </div>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="切换主题">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
        <div class="menu-icon" id="menuIcon" onclick="toggleMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
        </div>
    </nav>

    <main class="product-details-page" id="productContent">
        <div class="loading" style="text-align: center; padding: 100px 0;">加载中...</div>
    </main>

    <div class="friend-links">
        <div class="links-row">
            <a href="https://m.tb.cn/h.SQfZFM67ZAOsRs2">淘宝购买</a>
            <a href="https://www.midifan.com/">midifan</a>
            <a href="https://modulargrid.net/">modular grid</a>
            <a href="https://doepfer.de/">doepfer</a>
        </div>
        <div class="qr-code-container">
            <div class="qr-code-wrapper">
                <img src="tb_qrcode.png" alt="淘宝店铺">
                <p>淘宝店铺</p>
            </div>
            <div class="qr-code-wrapper">
                <img src="qrcode.png" alt="手机扫码查看">
                <p>手机扫码查看</p>
            </div>
        </div>
        <div class="copyright">© 2023 - 2026 Coding Inspire Modular</div>
    </div>

    <div class="cookie-notice">
        <p>我们使用cookies来改善您的体验。继续使用本网站即表示您同意我们的cookies政策。<a href="#">了解更多</a></p>
        <button class="close-cookie" onclick="closeCookie()">×</button>
    </div>

    <script>
        let productSlideIndex = 1;

        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        function toggleTheme() {
            const root = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            if (root.classList.contains('dark-theme')) {
                root.classList.remove('dark-theme');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                `;
            } else {
                root.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                `;
            }
        }

        function initTheme() {
            const root = document.documentElement;
            const themeToggle = document.getElementById('themeToggle');
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                root.classList.add('dark-theme');
                themeToggle.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                    </svg>
                `;
            } else {
                root.classList.remove('dark-theme');
                themeToggle.innerHTML = `
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                    </svg>
                `;
            }
        }

        function closeCookie() {
            document.querySelector('.cookie-notice').style.display = 'none';
        }

        function plusProductSlides(n) {
            showProductSlides(productSlideIndex += n);
        }

        function showProductSlides(n) {
            const slides = document.getElementById("product-slides")?.getElementsByClassName("slide");
            if (!slides) return;
            if (n > slides.length) productSlideIndex = 1;
            if (n < 1) productSlideIndex = slides.length;
            for (let i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[productSlideIndex - 1].style.display = "block";
        }

        function getUrlParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        async function loadProduct() {
            const productId = getUrlParam('id');
            if (!productId) {
                document.getElementById('productContent').innerHTML = '<div style="text-align: center; padding: 100px 0;">产品ID无效</div>';
                return;
            }

            try {
                const response = await fetch('data/products.json');
                const data = await response.json();
                const product = data.products.find(p => p.id === productId);
                
                if (!product) {
                    document.getElementById('productContent').innerHTML = '<div style="text-align: center; padding: 100px 0;">产品不存在</div>';
                    return;
                }

                renderProduct(product);
            } catch (error) {
                console.error('Failed to load product:', error);
                document.getElementById('productContent').innerHTML = '<div style="text-align: center; padding: 100px 0;">加载失败</div>';
            }
        }

        function renderProduct(product) {
            document.title = product.name + ' | Coding Inspire Modular';
            
            const featuresHtml = product.features.map(feature => `
                <div class="feature-item">
                    <h6>${feature.name}</h6>
                    <p>${feature.desc}</p>
                </div>
            `).join('');

            const content = `
                <div class="product-details">
                    <div class="product-details-slider">
                        <div class="slider">
                            <div class="slides" id="product-slides">
                                <div class="slide"><img src="${product.image}" alt="${product.name}"></div>
                                <div class="slide"><img src="${product.image}" alt="${product.name}"></div>
                                <div class="slide"><img src="${product.image}" alt="${product.name}"></div>
                            </div>
                            <button class="prev" onclick="plusProductSlides(-1)">&#10094;</button>
                            <button class="next" onclick="plusProductSlides(1)">&#10095;</button>
                        </div>
                    </div>
                    <div class="product-details-info">
                        <h1 class="product-details-title">${product.name}</h1>
                        <h2 class="product-details-subtitle">${product.subtitle}</h2>
                        <p class="product-details-price">${product.price}</p>
                        <p class="product-details-desc">${product.specs}</p>
                    </div>
                </div>

                <div class="product-more-desc">
                    <h5>功能概述</h5>
                    <div class="feature-list">${featuresHtml}</div>
                </div>

                <div class="manual-area">
                    <p>产品手册：</p>
                    ${product.manualUrl && product.manualUrl !== '#' ? 
                        `<a href="${product.manualUrl}" target="_blank" class="btn">查看手册</a>` : 
                        '<span style="color: var(--text-muted);">手册即将推出</span>'}
                </div>
            `;

            document.getElementById('productContent').innerHTML = content;
            showProductSlides(productSlideIndex);
        }

        window.addEventListener('scroll', function() {
            const nav = document.querySelector('nav');
            nav.classList.toggle('scrolled', window.scrollY > 0);
        });

        initTheme();
        loadProduct();
    </script>
</body>
</html>
