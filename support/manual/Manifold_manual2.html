<!DOCTYPE html>
<html>

<head>
  <link rel="icon" href="../icon.ico" type="image/x-icon">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* 页面整体样式 */
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
      color: #333;
    }

    /* 显示 Markdown 内容的容器样式 */
    #markdown-content {
      margin-top: 20px;
      padding: 20px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #f9f9f9;
    }

    /* 标题样式 */
    #markdown-content h1,
    #markdown-content h2,
    #markdown-content h3,
    #markdown-content h4,
    #markdown-content h5,
    #markdown-content h6 {
      color: #ec8600;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    #markdown-content h1 {
      font-size: 24px;
    }

    #markdown-content h2 {
      font-size: 20px;
    }

    #markdown-content h3 {
      font-size: 18px;
    }

    #markdown-content h4 {
      font-size: 16px;
    }

    #markdown-content h5 {
      font-size: 14px;
    }

    #markdown-content h6 {
      font-size: 12px;
    }

    /* 列表样式 */
    #markdown-content ul,
    #markdown-content ol {
      padding-left: 20px;
    }

    /* 链接样式 */
    #markdown-content a {
      color: #ec8600;
      text-decoration: none;
    }

    #markdown-content a:hover {
      text-decoration: underline;
    }

    /* 目录样式 */
   .table-of-contents {
      margin-bottom: 20px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      background-color: #f5f5f5;
    }

   .table-of-contents h2 {
      margin-top: 0;
      color: #333;
      border-bottom: none;
    }

   .table-of-contents ul {
      list-style-type: none;
      padding: 0;
    }

   .table-of-contents ul li {
      margin-bottom: 5px;
    }

   .table-of-contents a {
      color: #666; /* 修改为灰色 */
      text-decoration: none; /* 去掉下划线 */
      font-weight: 500; /* 设置稍微粗一点的字体 */
    }

   .table-of-contents a:hover {
      text-decoration: underline; /* 鼠标悬停时显示下划线 */
    }

    /* 手动重试按钮样式 */
   .retry-button {
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #ffbb00;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

   .retry-button:hover {
      background-color: #ffaa33;
    }

    /* 链接样式 */
   .source-link {
      margin-left: 10px;
      color: #ffaa33;
      text-decoration: none;
    }

   .source-link:hover {
      text-decoration: underline;
    }

    /* 加载提示样式 */
   .loading-tip {
      color: #666;
      margin-top: 10px;
    }
  </style>
    <style id="inline-css">
:root {
  --primary-color: #ffffff;
  --secondary-color: #f5f5f5;
  --accent-color: #ff6b35;
  --accent-hover: #ff8c5a;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-muted: #999999;
  --bg-primary: #ffffff;
  --bg-secondary: #fafafa;
  --bg-card: #ffffff;
  --border-color: #e0e0e0;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

:root.dark-theme {
  --primary-color: #1a1a1a;
  --secondary-color: #2a2a2a;
  --accent-color: #ff6b35;
  --accent-hover: #ff8c5a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --bg-primary: #0d0d0d;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --border-color: #2a2a2a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection {
  background-color: var(--accent-color);
  color: white;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background-color: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  transition: all var(--transition-normal);
}

nav.scrolled {
  background-color: rgba(255, 255, 255, 0.95);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

:root.dark-theme nav {
  background-color: rgba(13, 13, 13, 0.9);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

:root.dark-theme nav.scrolled {
  background-color: rgba(13, 13, 13, 0.95);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}

.logo {
  height: 48px;
  width: auto;
  transition: transform var(--transition-fast);
}

.logo:hover {
  transform: scale(1.05);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  position: relative;
  transition: color var(--transition-fast);
  text-transform: uppercase;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--text-primary);
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-color), var(--accent-hover));
  transition: width var(--transition-normal);
}

.nav-links a:hover::after,
.nav-links a.active::after {
  width: 100%;
}

.theme-toggle {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-toggle:hover {
  color: var(--text-primary);
  background: rgba(0, 0, 0, 0.05);
  transform: rotate(15deg);
}

:root.dark-theme .theme-toggle:hover {
  background: rgba(255, 255, 255, 0.1);
}

.menu-icon {
  display: none;
  cursor: pointer;
  color: var(--text-primary);
}

.hero-section {
  margin-top: 80px;
  position: relative;
  overflow: hidden;
}

.slider {
  position: relative;
  width: 100%;
  height: calc(100vh - 80px);
  overflow: hidden;
}

.slides {
  display: flex;
  transition: transform var(--transition-slow);
}

.slide {
  min-width: 100%;
  height: calc(100vh - 80px);
  position: relative;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}

.slide-content {
  position: absolute;
  bottom: 100px;
  left: 60px;
  max-width: 600px;
}

.slide-content h2 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 16px;
  color: #ffffff;
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 2px 4px rgba(0, 0, 0, 0.5);
}

.slide-content p {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 24px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}

.slide-content .btn {
  display: inline-block;
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 50px;
  transition: all var(--transition-fast);
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.slide-content .btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(255, 107, 53, 0.4);
}

.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px);
  color: var(--text-primary);
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
  cursor: pointer;
  transition: all var(--transition-fast);
  z-index: 10;
}

.prev:hover, .next:hover {
  background: rgba(0, 0, 0, 0.2);
  transform: translateY(-50%) scale(1.1);
}

:root.dark-theme .prev,
:root.dark-theme .next {
  background: rgba(255, 255, 255, 0.1);
  color: white;
}

:root.dark-theme .prev:hover,
:root.dark-theme .next:hover {
  background: rgba(255, 255, 255, 0.2);
}

.prev {
  left: 32px;
}

.next {
  right: 32px;
}

.featured-products {
  padding: 80px 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 60px;
}

.section-header h2 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 16px;
}

.section-header p {
  color: var(--text-secondary);
  font-size: 16px;
}

.category-filter {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 48px;
}

.category-btn {
  padding: 10px 24px;
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  border-radius: 50px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.category-btn:hover,
.category-btn.active {
  background: var(--accent-color);
  border-color: var(--accent-color);
  color: white;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.product-item {
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition-normal);
  border: 1px solid var(--border-color);
}

.product-item:hover {
  transform: translateY(-8px);
  border-color: var(--accent-color);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.product-image-container {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
}

.product-image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--transition-slow);
}

.product-item:hover .product-image-container img {
  transform: scale(1.1);
}

.product-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 6px 14px;
  background: var(--accent-color);
  color: white;
  font-size: 12px;
  font-weight: 600;
  border-radius: 50px;
}

.product-info {
  padding: 20px;
}

.product-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.product-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.product-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.product-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-color);
}

.brand-introduction {
  padding: 100px 40px;
  background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
  text-align: center;
  max-width: 1200px;
  margin: 0 auto;
}

.brand-introduction h5 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--text-primary);
}

.brand-introduction p {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 2;
  margin-bottom: 32px;
}

.friend-links {
  background: var(--secondary-color);
  padding: 60px 40px;
  text-align: center;
}

.friend-links .links-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 48px;
  margin-bottom: 48px;
}

.friend-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition-fast);
}

.friend-links a:hover {
  color: var(--accent-color);
}

.qr-code-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 48px;
}

.qr-code-wrapper {
  background: var(--bg-card);
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.qr-code-wrapper img {
  width: 120px;
  height: 120px;
  display: block;
  margin-bottom: 12px;
}

.qr-code-wrapper p {
  font-size: 14px;
  color: var(--text-secondary);
}

.copyright {
  color: var(--text-muted);
  font-size: 13px;
}

.cookie-notice {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border-color);
  z-index: 1001;
  animation: slideUp 0.5s ease;
}

:root.dark-theme .cookie-notice {
  background: rgba(26, 26, 26, 0.95);
}

@keyframes slideUp {
  from {
    transform: translateY(100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.cookie-notice p {
  font-size: 14px;
  color: var(--text-secondary);
}

.cookie-notice a {
  color: var(--accent-color);
  text-decoration: none;
}

.close-cookie {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 24px;
  cursor: pointer;
  transition: color var(--transition-fast);
}

.close-cookie:hover {
  color: var(--text-primary);
}

.product-details-page {
  padding: 120px 40px 80px;
  max-width: 1400px;
  margin: 0 auto;
}

.product-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  margin-bottom: 60px;
}

.product-details-slider {
  position: relative;
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border-color);
}

.product-details-slider .slider {
  height: 500px;
}

.product-details-slider .slide {
  height: 500px;
}

.product-details-info {
  display: flex;
  flex-direction: column;
}

.product-details-title {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 12px;
}

.product-details-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.product-details-price {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-color);
  margin-bottom: 32px;
}

.product-details-desc {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  white-space: pre-wrap;
  padding: 24px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.product-more-desc {
  margin-bottom: 48px;
}

.product-more-desc h5 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
}

.feature-list {
  display: grid;
  gap: 16px;
}

.feature-item {
  padding: 20px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  transition: all var(--transition-fast);
}

.feature-item:hover {
  border-color: var(--accent-color);
}

.feature-item h6 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent-color);
}

.feature-item p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-wrap;
}

.manual-area {
  text-align: center;
  padding: 32px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 60px;
}

.manual-area p {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.manual-area .btn {
  display: inline-block;
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 50px;
  transition: all var(--transition-fast);
}

.manual-area .btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.support-page {
  padding: 120px 40px 80px;
  max-width: 1200px;
  margin: 0 auto;
}

.support-section {
  margin-bottom: 60px;
}

.support-section h3 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}

.support-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.support-card {
  padding: 24px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  transition: all var(--transition-fast);
}

.support-card:hover {
  border-color: var(--accent-color);
  transform: translateY(-4px);
}

.support-card h4 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.support-card p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.support-card .meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

.support-card a {
  color: var(--accent-color);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

.support-card a:hover {
  text-decoration: underline;
}

.contact-info {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 32px;
  border: 1px solid var(--border-color);
}

.contact-info h3 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.contact-item:last-child {
  margin-bottom: 0;
}

.contact-item svg {
  width: 20px;
  height: 20px;
  color: var(--accent-color);
}

.contact-item a,
.contact-item span {
  color: var(--text-secondary);
  text-decoration: none;
}

.contact-item a:hover {
  color: var(--accent-color);
}

.instrument-page {
  padding: 120px 40px 80px;
  text-align: center;
}

.instrument-page h2 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 16px;
}

.instrument-page p {
  font-size: 18px;
  color: var(--text-secondary);
}

.coming-soon {
  display: inline-block;
  padding: 12px 32px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 50px;
  margin-top: 32px;
  color: var(--text-secondary);
}

.blank-area {
  height: 120px;
}

@media (max-width: 768px) {
  nav {
    padding: 12px 20px;
  }

  .logo {
    height: 36px;
  }

  .nav-links {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    background: rgba(13, 13, 13, 0.98);
    backdrop-filter: blur(20px);
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    transform: translateY(-150%);
    opacity: 0;
    transition: all var(--transition-normal);
  }

  .nav-links.active {
    transform: translateY(0);
    opacity: 1;
  }

  .menu-icon {
    display: block;
  }

  .slide-content {
    bottom: 60px;
    left: 24px;
    right: 24px;
  }

  .slide-content h2 {
    font-size: 32px;
  }

  .slide-content p {
    font-size: 16px;
  }

  .prev, .next {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }

  .prev {
    left: 16px;
  }

  .next {
    right: 16px;
  }

  .featured-products {
    padding: 40px 20px;
  }

  .section-header h2 {
    font-size: 28px;
  }

  .products-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .product-details {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .product-details-slider .slider {
    height: 400px;
  }

  .product-details-slider .slide {
    height: 400px;
  }

  .product-details-title {
    font-size: 28px;
  }

  .brand-introduction {
    padding: 60px 20px;
  }

  .friend-links .links-row {
    gap: 24px;
  }

  .qr-code-container {
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .support-page,
  .instrument-page {
    padding: 100px 20px 60px;
  }
}

@media (max-width: 480px) {
  .slide-content h2 {
    font-size: 24px;
  }

  .slide-content p {
    font-size: 14px;
  }

  .product-details-title {
    font-size: 24px;
  }
}
    </style>
</head>

<body>
  <div class="table-of-contents" id="table-of-contents"></div>
  <div id="markdown-content"></div>
  <button class="retry-button" id="retry-button" style="display: none;">手动重试</button>
  <a href="#" class="source-link" id="source-link" style="display: none;"></a>
  <p class="loading-tip" id="loading-tip" style="display: block;">正在加载中 请稍后</p>

  <script>
    const currentUrl = window.location.href;
    const newUrl = currentUrl.replace('.html', '.md');
    const mdFilePath = newUrl;

    const maxRetries = 3; // 最大重试次数
    const retryInterval = 1000; // 重试间隔时间（毫秒）
    let retryCount = 0;

    const fetchWithRetry = async (url, retries = 0) => {
      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        const data = await response.text();
        return data;
      } catch (error) {
        if (retries < maxRetries) {
          console.log(`请求失败，正在重试（第 ${retries + 1} 次）...`);
          await new Promise(resolve => setTimeout(resolve, retryInterval));
          return fetchWithRetry(url, retries + 1);
        }
        console.error('请求失败，已达到最大重试次数:', error);
        // 显示手动重试按钮和源文件链接
        document.getElementById('retry-button').style.display = 'block';
        const sourceLink = document.getElementById('source-link');
        sourceLink.href = mdFilePath;
        sourceLink.textContent = mdFilePath;
        sourceLink.style.display = 'block';
        // 显示加载失败提示
        document.getElementById('loading-tip').textContent = '加载失败，请检查网络或重试';
        throw error;
      }
    };

    const loadMarkdown = async () => {
      try {
        const data = await fetchWithRetry(mdFilePath, retryCount);
        const html = marked.parse(data);
        document.getElementById('markdown-content').innerHTML = html;

        // 生成目录
        const generateTOC = () => {
          const toc = document.getElementById('table-of-contents');
          const headers = document.querySelectorAll('#markdown-content h2, #markdown-content h3');
          const tocList = document.createElement('ul');

          headers.forEach(header => {
            const id = header.id || `section-${Date.now()}-${Math.random()}`;
            header.id = id;
            const link = document.createElement('a');
            link.href = `#${id}`;
            link.textContent = header.textContent;
            const listItem = document.createElement('li');
            listItem.appendChild(link);
            tocList.appendChild(listItem);
          });

          const tocHeader = document.createElement('h2');
          tocHeader.textContent = '目录';
          toc.appendChild(tocHeader);
          toc.appendChild(tocList);
        };

        generateTOC();
        // 隐藏加载提示
        document.getElementById('loading-tip').style.display = 'none';
      } catch (error) {
        console.error('处理 Markdown 文件时出错:', error);
      }
    };

    // 初始加载
    loadMarkdown();

    // 手动重试按钮点击事件
    document.getElementById('retry-button').addEventListener('click', async () => {
      retryCount++;
      document.getElementById('retry-button').style.display = 'none';
      document.getElementById('source-link').style.display = 'none';
      // 显示加载提示
      document.getElementById('loading-tip').style.display = 'block';
      document.getElementById('loading-tip').textContent = '正在加载中 请稍后...';
      await loadMarkdown();
    });
  </script>
</body>

</html>
