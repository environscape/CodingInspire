<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在跳转...</title>
    <link rel="icon" href="../icon.ico" type="image/x-icon">
    <meta http-equiv="refresh" content="3; url=../support.html">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.6);
        }
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
        }
        .redirect-container {
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 400px;
            width: 90%;
        }
        .redirect-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .redirect-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 12px;
        }
        p {
            font-size: 14px;
            color: #666666;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        .redirect-btn {
            display: inline-block;
            padding: 12px 32px;
            background: linear-gradient(135deg, #ff6b35, #ff8c5a);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
        }
        .redirect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 30px rgba(255, 107, 53, 0.4);
        }
        .countdown {
            font-weight: 700;
            color: #ff6b35;
        }
    </style>
</head>
<body>
    <div class="bg-container">
        <img id="bg-img" class="bg-image" src="" alt="background">
        <div class="bg-overlay"></div>
    </div>

    <div class="redirect-container">
        <div class="redirect-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
        </div>
        <h1>正在跳转</h1>
        <p>页面正在自动跳转到 Support 页面<br>如果没有自动跳转，请点击下方按钮</p>
        <a href="../support.html" class="redirect-btn">前往 Support 页面</a>
        <p style="margin-top: 16px; font-size: 12px; color: #999;">将在 <span class="countdown">3</span> 秒后自动跳转</p>
    </div>

    <script>
        const banners = ['../banner01.jpg', '../banner02.jpg', '../banner03.jpg'];
        const randomBanner = banners[Math.floor(Math.random() * banners.length)];
        document.getElementById('bg-img').src = randomBanner;

        const countdownEl = document.querySelector('.countdown');
        const redirectUrl = '../support.html';

        let count = 3;
        const timer = setInterval(() => {
            count--;
            if (countdownEl) {
                countdownEl.textContent = count;
            }
        }, 1000);

        window.addEventListener('load', () => {
            setTimeout(() => {
                clearInterval(timer);
                window.location.href = redirectUrl;
            }, 500);
        });

        if (document.readyState === 'complete') {
            setTimeout(() => {
                clearInterval(timer);
                window.location.href = redirectUrl;
            }, 500);
        }
    </script>
</body>
</html>
