<!DOCTYPE html>
<html lang="en">
<!-- 该页面作为旧链接的兼容跳转 -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
    <link rel="icon" href="../icon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../style.css">
    <meta http-equiv="refresh" content="0; url=../support.html">
    <style id="inline-css">
:root {
  --primary-color: #ffffff;
  --secondary-color: #f5f5f5;
  --accent-color: #ff6b35;
  --accent-hover: #ff8c5a;
  --text-primary: #1a1a1a;
  --text-secondary: #666666;
  --text-muted: #999999;
  --bg-primary: #ffffff;
  --bg-secondary: #fafafa;
  --bg-card: #ffffff;
  --border-color: #e0e0e0;
  --transition-fast: 0.2s ease;
  --transition-normal: 0.3s ease;
  --transition-slow: 0.5s ease;
}

:root.dark-theme {
  --primary-color: #1a1a1a;
  --secondary-color: #2a2a2a;
  --accent-color: #ff6b35;
  --accent-hover: #ff8c5a;
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666666;
  --bg-primary: #0d0d0d;
  --bg-secondary: #141414;
  --bg-card: #1a1a1a;
  --border-color: #2a2a2a;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
  background-color: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

::selection {
  background-color: var(--accent-color);
  color: white;
}

nav {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background-color: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 32px;
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  transition: all var(--transition-normal);
}

nav.scrolled {
  background-color: rgba(255, 255, 255, 0.95);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
}

:root.dark-theme nav {
  background-color: rgba(13, 13, 13, 0.9);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
}

:root.dark-theme nav.scrolled {
  background-color: rgba(13, 13, 13, 0.95);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
}

.logo {
  height: 48px;
  width: auto;
  transition: transform var(--transition-fast);
}

.logo:hover {
  transform: scale(1.05);
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-links a {
  text-decoration: none;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.5px;
  position: relative;
  transition: color var(--transition-fast);
  text-transform: uppercase;
}

.nav-links a:hover,
.nav-links a.active {
  color: var(--text-primary);
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent-color), var(--accent-hover));
  transition: width var(--transition-normal);
}

.nav-links a:hover::after,
.nav-links a.active::after {
  width: 100%;
}

.theme-toggle {
  background: transparent;
  border: none;
  color: var(--text-secondary);
  cursor: pointer;
  padding: 8px;
  border-radius: 50%;
  transition: all var(--transition-fast);
  display: flex;
  align-items: center;
  justify-content: center;
}

.theme-toggle:hover {
  color: var(--text-primary);
  background: rgba(0, 0, 0, 0.05);
  transform: rotate(15deg);
}

:root.dark-theme .theme-toggle:hover {
  background: rgba(255, 255, 255, 0.1);
}

.menu-icon {
  display: none;
  cursor: pointer;
  color: var(--text-primary);
}

.hero-section {
  margin-top: 80px;
  position: relative;
  overflow: hidden;
}

.slider {
  position: relative;
  width: 100%;
  height: calc(100vh - 80px);
  overflow: hidden;
}

.slides {
  display: flex;
  transition: transform var(--transition-slow);
}

.slide {
  min-width: 100%;
  height: calc(100vh - 80px);
  position: relative;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.7);
}

.slide-content {
  position: absolute;
  bottom: 100px;
  left: 60px;
  max-width: 600px;
}

.slide-content h2 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 16px;
  color: #ffffff;
  text-shadow: 0 4px 20px rgba(0, 0, 0, 0.8), 0 2px 4px rgba(0, 0, 0, 0.5);
}

.slide-content p {
  font-size: 18px;
  color: rgba(255, 255, 255, 0.9);
  margin-bottom: 24px;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.6);
}

.slide-content .btn {
  display: inline-block;
  padding: 14px 32px;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 50px;
  transition: all var(--transition-fast);
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.slide-content .btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 30px rgba(255, 107, 53, 0.4);
}

.prev, .next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(10px);
  color: var(--text-primary);
  border: none;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  font-size: 24px;
  cursor: pointer;
  transition: all var(--transition-fast);
  z-index: 10;
}

.prev:hover, .next:hover {
  background: rgba(0, 0, 0, 0.2);
  transform: translateY(-50%) scale(1.1);
}

:root.dark-theme .prev,
:root.dark-theme .next {
  background: rgba(255, 255, 255, 0.1);
  color: white;
}

:root.dark-theme .prev:hover,
:root.dark-theme .next:hover {
  background: rgba(255, 255, 255, 0.2);
}

.prev {
  left: 32px;
}

.next {
  right: 32px;
}

.featured-products {
  padding: 80px 40px;
  max-width: 1400px;
  margin: 0 auto;
}

.section-header {
  text-align: center;
  margin-bottom: 60px;
}

.section-header h2 {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 16px;
}

.section-header p {
  color: var(--text-secondary);
  font-size: 16px;
}

.category-filter {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 48px;
}

.category-btn {
  padding: 10px 24px;
  background: transparent;
  border: 1px solid var(--border-color);
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  border-radius: 50px;
  cursor: pointer;
  transition: all var(--transition-fast);
}

.category-btn:hover,
.category-btn.active {
  background: var(--accent-color);
  border-color: var(--accent-color);
  color: white;
}

.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 32px;
}

.product-item {
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition-normal);
  border: 1px solid var(--border-color);
}

.product-item:hover {
  transform: translateY(-8px);
  border-color: var(--accent-color);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
}

.product-image-container {
  position: relative;
  aspect-ratio: 1;
  overflow: hidden;
}

.product-image-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform var(--transition-slow);
}

.product-item:hover .product-image-container img {
  transform: scale(1.1);
}

.product-badge {
  position: absolute;
  top: 16px;
  right: 16px;
  padding: 6px 14px;
  background: var(--accent-color);
  color: white;
  font-size: 12px;
  font-weight: 600;
  border-radius: 50px;
}

.product-info {
  padding: 20px;
}

.product-title {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 8px;
}

.product-subtitle {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.product-desc {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

.product-price {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-color);
}

.brand-introduction {
  padding: 100px 40px;
  background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
  text-align: center;
  max-width: 1200px;
  margin: 0 auto;
}

.brand-introduction h5 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--text-primary);
}

.brand-introduction p {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 2;
  margin-bottom: 32px;
}

.friend-links {
  background: var(--secondary-color);
  padding: 60px 40px;
  text-align: center;
}

.friend-links .links-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 48px;
  margin-bottom: 48px;
}

.friend-links a {
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  transition: all var(--transition-fast);
}

.friend-links a:hover {
  color: var(--accent-color);
}

.qr-code-container {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-bottom: 48px;
}

.qr-code-wrapper {
  background: var(--bg-card);
  padding: 16px;
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.qr-code-wrapper img {
  width: 120px;
  height: 120px;
  display: block;
  margin-bottom: 12px;
}

.qr-code-wrapper p {
  font-size: 14px;
  color: var(--text-secondary);
}

.copyright {
  color: var(--text-muted);
  font-size: 13px;
}

.cookie-notice {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(10px);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid var(--border-color);
  z-index: 1001;
  animation: slideUp 0.5s ease;
}

:root.dark-theme .cookie-notice {
  background: rgba(26, 26, 26, 0.95);
}

@keyframes slideUp {
  from {
    transform: translateY(100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.cookie-notice p {
  font-size: 14px;
  color: var(--text-secondary);
}

.cookie-notice a {
  color: var(--accent-color);
  text-decoration: none;
}

.close-cookie {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 24px;
  cursor: pointer;
  transition: color var(--transition-fast);
}

.close-cookie:hover {
  color: var(--text-primary);
}

.product-details-page {
  padding: 120px 40px 80px;
  max-width: 1400px;
  margin: 0 auto;
}

.product-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  margin-bottom: 60px;
}

.product-details-slider {
  position: relative;
  background: var(--bg-card);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border-color);
}

.product-details-slider .slider {
  height: 500px;
}

.product-details-slider .slide {
  height: 500px;
}

.product-details-info {
  display: flex;
  flex-direction: column;
}

.product-details-title {
  font-size: 36px;
  font-weight: 700;
  margin-bottom: 12px;
}

.product-details-subtitle {
  font-size: 18px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.product-details-price {
  font-size: 28px;
  font-weight: 700;
  color: var(--accent-color);
  margin-bottom: 32px;
}

.product-details-desc {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  white-space: pre-wrap;
  padding: 24px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
}

.product-more-desc {
  margin-bottom: 48px;
}

.product-more-desc h5 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
}

.feature-list {
  display: grid;
  gap: 16px;
}

.feature-item {
  padding: 20px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  transition: all var(--transition-fast);
}

.feature-item:hover {
  border-color: var(--accent-color);
}

.feature-item h6 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
  color: var(--accent-color);
}

.feature-item p {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.6;
  white-space: pre-wrap;
}

.manual-area {
  text-align: center;
  padding: 32px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  margin-bottom: 60px;
}

.manual-area p {
  font-size: 16px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}

.manual-area .btn {
  display: inline-block;
  padding: 12px 32px;
  background: linear-gradient(135deg, var(--accent-color), var(--accent-hover));
  color: white;
  text-decoration: none;
  font-weight: 600;
  border-radius: 50px;
  transition: all var(--transition-fast);
}

.manual-area .btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
}

.support-page {
  padding: 120px 40px 80px;
  max-width: 1200px;
  margin: 0 auto;
}

.support-section {
  margin-bottom: 60px;
}

.support-section h3 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-color);
}

.support-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.support-card {
  padding: 24px;
  background: var(--bg-card);
  border-radius: 12px;
  border: 1px solid var(--border-color);
  transition: all var(--transition-fast);
}

.support-card:hover {
  border-color: var(--accent-color);
  transform: translateY(-4px);
}

.support-card h4 {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 8px;
}

.support-card p {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.support-card .meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-muted);
}

.support-card a {
  color: var(--accent-color);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
}

.support-card a:hover {
  text-decoration: underline;
}

.contact-info {
  background: var(--bg-card);
  border-radius: 12px;
  padding: 32px;
  border: 1px solid var(--border-color);
}

.contact-info h3 {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 24px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
}

.contact-item:last-child {
  margin-bottom: 0;
}

.contact-item svg {
  width: 20px;
  height: 20px;
  color: var(--accent-color);
}

.contact-item a,
.contact-item span {
  color: var(--text-secondary);
  text-decoration: none;
}

.contact-item a:hover {
  color: var(--accent-color);
}

.instrument-page {
  padding: 120px 40px 80px;
  text-align: center;
}

.instrument-page h2 {
  font-size: 48px;
  font-weight: 700;
  margin-bottom: 16px;
}

.instrument-page p {
  font-size: 18px;
  color: var(--text-secondary);
}

.coming-soon {
  display: inline-block;
  padding: 12px 32px;
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: 50px;
  margin-top: 32px;
  color: var(--text-secondary);
}

.blank-area {
  height: 120px;
}

@media (max-width: 768px) {
  nav {
    padding: 12px 20px;
  }

  .logo {
    height: 36px;
  }

  .nav-links {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    background: rgba(13, 13, 13, 0.98);
    backdrop-filter: blur(20px);
    flex-direction: column;
    padding: 24px;
    gap: 20px;
    transform: translateY(-150%);
    opacity: 0;
    transition: all var(--transition-normal);
  }

  .nav-links.active {
    transform: translateY(0);
    opacity: 1;
  }

  .menu-icon {
    display: block;
  }

  .slide-content {
    bottom: 60px;
    left: 24px;
    right: 24px;
  }

  .slide-content h2 {
    font-size: 32px;
  }

  .slide-content p {
    font-size: 16px;
  }

  .prev, .next {
    width: 40px;
    height: 40px;
    font-size: 18px;
  }

  .prev {
    left: 16px;
  }

  .next {
    right: 16px;
  }

  .featured-products {
    padding: 40px 20px;
  }

  .section-header h2 {
    font-size: 28px;
  }

  .products-grid {
    grid-template-columns: 1fr;
    gap: 24px;
  }

  .product-details {
    grid-template-columns: 1fr;
    gap: 40px;
  }

  .product-details-slider .slider {
    height: 400px;
  }

  .product-details-slider .slide {
    height: 400px;
  }

  .product-details-title {
    font-size: 28px;
  }

  .brand-introduction {
    padding: 60px 20px;
  }

  .friend-links .links-row {
    gap: 24px;
  }

  .qr-code-container {
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .support-page,
  .instrument-page {
    padding: 100px 20px 60px;
  }
}

@media (max-width: 480px) {
  .slide-content h2 {
    font-size: 24px;
  }

  .slide-content p {
    font-size: 14px;
  }

  .product-details-title {
    font-size: 24px;
  }
}
    </style>
</head>

    <!-- Cookie提示条 -->
    <div class="cookie-notice">
        <p>We use cookies to improve your experience on our site. By continuing to use our site you consent to use our
            cookies. Find out more <a href="#">here</a>.</p>
        <button class="close-cookie">×</button>
    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("slide");
            if (n > slides.length) {
                slideIndex = 1;
            }
            if (n < 1) {
                slideIndex = slides.length;
            }
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";
            }
            slides[slideIndex - 1].style.display = "block";
        }

        const closeButton = document.querySelector('.close-cookie');
        const cookieNotice = document.querySelector('.cookie-notice');

        closeButton.addEventListener('click', function () {
            cookieNotice.style.display = 'none';
        });

        // 更新 img 的 alt 属性
        const productItems = document.querySelectorAll('.product-item');
        productItems.forEach(item => {
            const img = item.querySelector('img');
            const h3 = item.querySelector('h3');
            if (img && h3) {
                img.alt = h3.textContent;
            }
        });

        /* 导航栏透明度动画的JavaScript实现 */
        window.addEventListener('scroll', function () {
            const nav = document.querySelector('nav');
            if (window.pageYOffset > 0) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

    </script>
